services:
  pulsebeat:
    build: .
    mem_limit: 512m
    ports:
      - "4141:4141"
    volumes:
      - ./data:/app/data
    environment:
      NODE_ENV: production
      PULSEBEAT_DATA_DIR: /app/data
      # Required in production (min 16 characters). Generate e.g. openssl rand -hex 32
      PULSEBEAT_JWT_SECRET: ${PULSEBEAT_JWT_SECRET:-}
      # Initial admin password (only used when the users table is first created)
      PULSEBEAT_ADMIN_PASSWORD: ${PULSEBEAT_ADMIN_PASSWORD:-}
      PULSEBEAT_ADMIN_USER: ${PULSEBEAT_ADMIN_USER:-admin}
      # Optional: CORS + CSP connect-src (comma-separated origins, e.g. https://pulsebeat.example.com)
      PULSEBEAT_ALLOWED_ORIGINS: ${PULSEBEAT_ALLOWED_ORIGINS:-}
    develop:
      watch:
        # Rebuild image when runtime API code changes.
        - action: rebuild
          path: ./server
        # Rebuild image when client source changes (static bundle is baked into image).
        - action: rebuild
          path: ./client
        # Rebuild if dependency manifests or image build instructions change.
        - action: rebuild
          path: ./package.json
        - action: rebuild
          path: ./package-lock.json
        - action: rebuild
          path: ./server/package.json
        - action: rebuild
          path: ./client/package.json
        - action: rebuild
          path: ./Dockerfile
        - action: rebuild
          path: ./docker-entrypoint.sh
